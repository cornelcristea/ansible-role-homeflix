---
# defaults file for homeflix

# data volume for docker services
homeflix_data_volume: "{{ homeflix_host_volume }}/data"

# ports for docker services
homeflix_bazarr_port: 6767
homeflix_jellyfin_port: 8096
homeflix_jellyfin_port_https: 8920
homeflix_prowlarr_port: 9696
homeflix_qbittorrent_port: 8080
homeflix_radarr_port: 7878
homeflix_seerr_port: 5055
homeflix_sonarr_port: 8989

# timezone for docker services
homeflix_timezone: UTC

# list with extra data folders
# used when jellyfin libraries are added
homeflix_data_folders_extra: []

# default password for qbittorrent
# after deploy, change ONLY the password and use in playbook as ecrypted
homeflix_qbittorrent_password: adminadmin

# default api key for bazarr
# after deploy, generate a new one and use in playbook as ecrypted
homeflix_bazarr_api_key: 463482c2b8172db0ba2736f6a0b3dbc7

# default api key for jellyfin
# after deploy, generate a new one and use in playbook as ecrypted
homeflix_jellyfin_api_key: c62af39cf6634c6ca52c92b02f618b84

# name shown in dashboard and in the browser tabs
homeflix_jellyfin_server_name: HomeFlix

# use ansible vault to encrypt the passwords in playbook
# isAdmin: make the user an admin (false if not defined)
# isHidden: enable/disable login panel visibility (true if not defined)
homeflix_jellyfin_users:
  - username: homeflix
    password: pass123
    isAdmin: false
    isHidden: false

# homeflix_jellyfin_plugins:
#   - name: MyPlugin
#     src: https://example.com/blablabla/plugin.zip
homeflix_jellyfin_plugins: []

# homeflix_jellyfin_custom_css: |
#   @import(https://example.com/blablabla/file.css);
#   :root { --bold: 18px }
homeflix_jellyfin_custom_css: []

homeflix_jellyfin_splash_screen_enabled: false

homeflix_jellyfin_libraries_extra: []

homeflix_prowlarr_indexers_extra: []

